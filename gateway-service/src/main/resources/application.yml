server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/orders/**

        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/products/**

        - id: inventory-service
          uri: http://localhost:8085
          predicates:
            - Path=/inventory/**
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"