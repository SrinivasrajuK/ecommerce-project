services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0

    container_name: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      KAFKA_HEAP_OPTS: "-Xms64m -Xmx64m"

    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0

    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"

  redis:
    image: redis:7

    container_name: redis

    ports:
      - "6379:6379"

  mysql-order:
    image: mysql:8

    container_name: mysql-order

    command:
      - --innodb-buffer-pool-size=32M
      - --skip-performance-schema
      - --mysqlx=OFF
      - --max_connections=50

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db

    ports:
      - "3307:3306"

  mysql-inventory:
    image: mysql:8

    container_name: mysql-inventory

    command:
      - --innodb-buffer-pool-size=32M
      - --skip-performance-schema
      - --mysqlx=OFF
      - --max_connections=50

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db

    ports:
      - "3308:3306"

  mysql-user:
    image: mysql:8

    container_name: mysql-user

    command:
      - --innodb-buffer-pool-size=32M
      - --skip-performance-schema
      - --mysqlx=OFF
      - --max_connections=50

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db

    ports:
      - "3309:3306"

  mysql-product:
    image: mysql:8

    container_name: mysql-product

    command:
      - --innodb-buffer-pool-size=32M
      - --skip-performance-schema
      - --mysqlx=OFF
      - --max_connections=50

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_db

    ports:
      - "3310:3306"

  order-service:
    build:
      context: ./order-service

    container_name: order-service

    depends_on:
      - kafka
      - mysql-order

    ports:
      - "8084:8084"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"

  inventory-service:
    build:
      context: ./inventory-service

    container_name: inventory-service

    depends_on:
      - kafka
      - mysql-inventory

    ports:
      - "8085:8085"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"

  payment-service:
    build:
      context: ./payment-service

    container_name: payment-service

    depends_on:
      - kafka

    ports:
      - "8086:8086"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"

  saga-orchestrator:
    build:
      context: ./saga-orchestrator

    container_name: saga-orchestrator

    depends_on:
      - kafka

    ports:
      - "8087:8087"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"

  notification-service:
    build:
      context: ./notification-service

    container_name: notification-service

    depends_on:
      - kafka

    ports:
      - "8088:8088"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"

  user-service:
    build:
      context: ./user-service

    container_name: user-service

    depends_on:
      - mysql-user

    ports:
      - "8081:8081"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"

  product-service:
    build:
      context: ./product-service

    container_name: product-service

    depends_on:
      - mysql-product
      - redis

    ports:
      - "8083:8083"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"

  gateway-service:
    build:
      context: ./gateway-service

    container_name: gateway-service

    depends_on:
      - order-service
      - product-service
      - inventory-service

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xms32m -Xmx128m"
